<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trueload Nigeria | Order Materials</title>
<style>
:root{--green:#0a8f3c;--dark:#0b3d20;--light:#f4f7f5}
*{box-sizing:border-box}
body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--light);color:#222}
header{background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.6)),url('https://images.unsplash.com/photo-1581092160607-ee22731c9c4b');background-size:cover;background-position:center;color:#fff;padding:70px 20px;text-align:center}
header h1{font-size:34px;margin-bottom:10px}
header p{font-size:16px;margin-bottom:20px}
.cta{display:inline-block;padding:14px 24px;background:var(--green);color:#fff;text-decoration:none;border-radius:6px;font-weight:bold}
.container{padding:20px;max-width:1000px;margin:auto}
.section{background:#fff;margin:18px 0;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
h2{color:var(--green)}
input, select, textarea{width:100%;padding:10px;margin:8px 0;border-radius:5px;border:1px solid #ccc}
.button{display:inline-block;margin-top:10px;padding:12px 18px;background:var(--green);color:#fff;text-decoration:none;border-radius:5px;border:none;cursor:pointer}
footer{text-align:center;padding:25px;font-size:14px;color:#555}
</style>
</head>
<body>

<header>
<h1>Trueload Nigeria</h1>
<p>Order Verified Sand & Granite in Minutes</p>
</header>

<div class="container">

<div class="section">
<h2>Place Your Order</h2>
<form id="orderForm">

<label>Material Type</label>
<select id="material">
<option>Filling Sand</option>
<option>Sharp Sand</option>
<option>Plaster Sand</option>
<option>Granite (1/2)</option>
<option>Granite (3/4)</option>
<option>Granite (1 inch)</option>
<option>Laterite</option>
<option>Stone Dust</option>
</select>

<label>Tonnage</label>
<select id="tonnage">
<option>20 Tons</option>
<option>25 Tons</option>
<option>30 Tons</option>
</select>

<label>Delivery Location</label>
<input type="text" id="location" placeholder="e.g. Ajah, Ikorodu, Lekki">

<label>Delivery Date</label>
<input type="date" id="date">

<label>Additional Note</label>
<textarea id="note" placeholder="Anything we should know?"></textarea>

<button type="button" class="button" onclick="sendOrder()">Send Order on WhatsApp</button>

</form>
</div>

<div class="section">
<h2>How It Works</h2>
<ol>
<li>Fill the form</li>
<li>Click send</li>
<li>We confirm price & availability</li>
<li>Truck is dispatched</li>
</ol>
</div>

<div class="section">
<h2>Contact</h2>
<p>08110463609 | 09166757048</p>
<p>Lagos & Across Nigeria</p>
</div>

</div>

<footer>
© 2026 Trueload Nigeria
</footer>

<script>
function sendOrder(){
  let material = document.getElementById('material').value;
  let tonnage = document.getElementById('tonnage').value;
  let location = document.getElementById('location').value;
  let date = document.getElementById('date').value;
  let note = document.getElementById('note').value;

  let message = `Hello Trueload,%0A
I want to order materials:%0A
Material: ${material}%0A
Tonnage: ${tonnage}%0A
Location: ${location}%0A
Delivery Date: ${date}%0A
Note: ${note}`;

  let url = `https://wa.me/2348110463609?text=${message}`;
  window.open(url, '_blank');
}
</script>

</body>
</html>
